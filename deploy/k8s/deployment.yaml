apiVersion: v1
kind: ConfigMap
metadata:
  name: code-review-bot-config
  namespace: code-review
data:
  config.yaml: |
    server:
      port: "3000"
    github:
      token: ""
      webhook_secret: ""
    llm:
      provider: "openai"
      api_key: ""
      model: "gpt-4"
      temperature: 0.3
      max_tokens: 8000
    debug: false
---
apiVersion: v1
kind: Secret
metadata:
  name: code-review-bot-secret
  namespace: code-review
type: Opaque
stringData:
  GITHUB_TOKEN: ""
  GITHUB_WEBHOOK_SECRET: ""
  OPENAI_API_KEY: ""
  MINIMAX_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-review-bot
  namespace: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-review-bot
  template:
    metadata:
      labels:
        app: code-review-bot
    spec:
      containers:
      - name: code-review-bot
        image: ghcr.io/victoryann-claw/code-review-bot:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: GIN_MODE
          value: "release"
        envFrom:
        - secretRef:
            name: code-review-bot-secret
        - configMapRef:
            name: code-review-bot-config
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: code-review-bot-config
---
apiVersion: v1
kind: Service
metadata:
  name: code-review-bot
  namespace: code-review
spec:
  selector:
    app: code-review-bot
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-review-bot
  namespace: code-review
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - code-review.your-domain.com
    secretName: code-review-bot-tls
  rules:
  - host: code-review.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: code-review-bot
            port:
              number: 80
