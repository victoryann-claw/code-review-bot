apiVersion: v1
kind: Namespace
metadata:
  name: code-review
  labels:
    name: code-review
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: code-review-quota
  namespace: code-review
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 1Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: code-review-limits
  namespace: code-review
spec:
  limits:
  - default:
      memory: 256Mi
      cpu: 500m
    defaultRequest:
      memory: 128Mi
      cpu: 100m
    type: Container
